run:
  split: dev
  top_k_per_query: 5
  conflict_detector: vera
retrieval:
  backend: vera_bm25
llm:
  enabled: true
  provider: dashscope
  model: qwen-plus
  api_key_env: DASHSCOPE_API_KEY
  temperature: 0.0
  max_tokens: 1200
  cache_enabled: true
  cache_path: outputs/cache/qwen_plus.sqlite3
  cache_namespace: far-qwen-plus-v1
statistics:
  bootstrap_resamples: 2000
  bootstrap_seed: 1729
