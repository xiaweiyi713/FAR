run:
  split: dev
  top_k_per_query: 5
  conflict_detector: vera
retrieval:
  backend: vera_hybrid
  allow_dense_fallback: false
  sparse:
    k1: 1.5
    b: 0.75
  dense:
    model_name: BAAI/bge-m3
    device: cpu
    batch_size: 32
    local_files_only: false
  sparse_weight: 0.4
  dense_weight: 0.6
  rerank:
    enabled: true
    model_name: BAAI/bge-reranker-v2-m3
    device: cpu
    batch_size: 16
    candidate_k: 20
    preserve_base_top_k: 1
    local_files_only: false
llm:
  enabled: true
  provider: ollama
  model: qwen2.5:7b
  base_url: http://localhost:11434
  temperature: 0.0
  max_tokens: 1200
  cache_enabled: true
  cache_path: outputs/cache/qwen_open.sqlite3
  cache_namespace: far-qwen-open-v1
statistics:
  bootstrap_resamples: 2000
  bootstrap_seed: 1729
